<head>
  <title>CS2 Reactive (SignalCompanion)</title>
  <meta description="Counter-Strike 2 reactive lighting via the SignalCompanion HTTPS bridge: team base glow, HP gradient, low-HP pulse, kill flash, flashbang white-out, smoke and molotov tints, accelerating bomb tick, explosion and defuse flashes." />
  <meta publisher="SignalCompanion" />
  <meta property="brightness" label="Brightness" type="number" min="0" max="100" default="100" />
</head>

<body style="margin: 0; padding: 0; background: black">
  <canvas id="exCanvas" width="320" height="200"></canvas>
</body>

<script>
  // Reliable build. Lessons baked in: top-level start (SignalRGB doesn't call
  // onEngineReady), POST polling over the HTTPS bridge (GET gets cached/frozen),
  // NaN-safe colours (a stray NaN once froze everything to black), and a VER
  // marker in the readout so we can always tell which build SignalRGB loaded
  // (it caches the effect HTML hard — only a full restart reloads it).
  var VER = "v1.2";
  var c = document.getElementById("exCanvas");
  var ctx = c.getContext("2d");
  var W = 320, H = 200;

  var state = { connected: false };
  var okCount = 0, errCount = 0, lastOk = -99999, fetching = false, lastPoll = 0;
  var lastTeam = null, prevBomb = null, prevKills = null;
  var bombAt = -1, explodeUntil = -1, defuseUntil = -1, killUntil = -1;
  var disp = [10, 10, 12];

  function num(v, d) { v = +v; return isFinite(v) ? v : d; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function teamCol(team) {
    if (team === "T") return [210, 160, 0];      // amber/yellow
    if (team === "CT") return [0, 70, 205];       // blue
    return [0, 110, 170];                          // neutral cyan
  }

  function poll() {
    if (fetching) return;
    fetching = true;
    var done = false;
    function fin() { if (!done) { done = true; fetching = false; } }
    try {
      var ctrl = (typeof AbortController === "function") ? new AbortController() : null;
      var opts = { method: "POST", body: "1", cache: "no-store" };
      if (ctrl) opts.signal = ctrl.signal;
      var timer = setTimeout(function () { errCount++; if (ctrl) { try { ctrl.abort(); } catch (e) {} } fin(); }, 800);
      fetch("https://127.0.0.1:3443/state", opts)
        .then(function (r) { return r.json(); })
        .then(function (s) { clearTimeout(timer); if (s && typeof s === "object") { state = s; okCount++; lastOk = Date.now(); } fin(); })
        .catch(function () { clearTimeout(timer); errCount++; fin(); });
    } catch (e) { errCount++; fin(); }
  }

  function fill(r, g, b) {
    r = num(r, 0); g = num(g, 0); b = num(b, 0);
    r = r < 0 ? 0 : r > 255 ? 255 : r;
    g = g < 0 ? 0 : g > 255 ? 255 : g;
    b = b < 0 ? 0 : b > 255 ? 255 : b;
    ctx.fillStyle = "rgb(" + (r | 0) + "," + (g | 0) + "," + (b | 0) + ")";
    ctx.fillRect(0, 0, W, H);
  }

  // Returns the target colour [r,g,b] for the current state.
  function target(now) {
    var p = (Math.sin(now / 600) + 1) / 2;

    if (okCount === 0) return [110 + 130 * p, 0, 0];          // never reached bridge
    if (now - lastOk > 2500) return [210, 70 + 90 * p, 0];    // bridge went away
    if (now < explodeUntil) {                                 // explosion
      var e = (explodeUntil - now) / 700;
      return [255, lerp(60, 235, e), lerp(0, 150, e)];
    }
    if (now < defuseUntil) {                                  // defuse
      var d = (defuseUntil - now) / 600;
      return [lerp(20, 0, d), lerp(40, 255, d), lerp(40, 80, d)];
    }
    if (now < killUntil) return [255, 255, 255];              // kill flash

    if (!state || !state.connected) {                         // idle: bridge ok, no match
      var bc = lastTeam ? teamCol(lastTeam) : [0, 110, 170];
      var s = 0.45 + 0.45 * p;
      return [bc[0] * s, bc[1] * s, bc[2] * s];
    }

    lastTeam = state.team || lastTeam;
    var hp = (state.health == null) ? 100 : num(state.health, 100);
    var alive = hp > 0 && state.activity !== "menu";
    var col;

    if (state.bomb === "planted") {                          // accelerating red tick
      var frac = bombAt >= 0 ? Math.min(1, (now - bombAt) / 40000) : 0;
      var bp = (Math.sin(now / lerp(380, 90, frac)) + 1) / 2;
      col = [lerp(90, 255, bp), 0, 0];
    } else if (!alive) {                                     // dead → dim team
      var dc = teamCol(state.team);
      col = [dc[0] * 0.22 + 6, dc[1] * 0.22 + 6, dc[2] * 0.22 + 10];
    } else if (state.round_phase === "freezetime") {        // round start → team glow
      var fz = teamCol(state.team);
      col = [fz[0] * 0.85, fz[1] * 0.85, fz[2] * 0.85];
    } else {
      var k = hp / 100; if (k < 0) k = 0; if (k > 1) k = 1;  // HP gradient
      col = [lerp(220, 30, k), lerp(30, 200, k), 30];
      if (hp <= 35) { var lp = p * (1 - hp / 35); col = [lerp(col[0], 255, lp), lerp(col[1], 0, lp), 0]; }
      if (num(state.burning, 0) > 0) { var bf = (Math.sin(now / 55) + 1) / 2; col = [lerp(col[0], 255, 0.6), lerp(col[1], 100 + 70 * bf, 0.6), 0]; }
      if (num(state.smoked, 0) > 0) { var av = (col[0] + col[1] + col[2]) / 3; col = [lerp(col[0], av, 0.6), lerp(col[1], av, 0.6), lerp(col[2], av, 0.6)]; }
    }

    var fl = num(state.flashed, 0) / 255;                    // flashbang white-out
    if (fl > 0.02) col = [lerp(col[0], 255, fl), lerp(col[1], 255, fl), lerp(col[2], 255, fl)];
    return col;
  }

  function update() {
    var now = Date.now();
    try {
      // event edges
      if (state && state.bomb === "planted") { if (bombAt < 0) bombAt = now; } else { bombAt = -1; }
      if (state && state.bomb === "exploded" && prevBomb !== "exploded") explodeUntil = now + 700;
      if (state && state.bomb === "defused" && prevBomb !== "defused") defuseUntil = now + 600;
      prevBomb = state ? state.bomb : null;
      if (state && state.connected && prevKills != null && state.round_kills != null && state.round_kills > prevKills) killUntil = now + 300;
      prevKills = state ? state.round_kills : null;

      var t = target(now);
      var sp = 0.25;                                          // light smoothing
      if (!isFinite(disp[0])) disp[0] = num(t[0], 0);
      if (!isFinite(disp[1])) disp[1] = num(t[1], 0);
      if (!isFinite(disp[2])) disp[2] = num(t[2], 0);
      disp[0] = lerp(disp[0], num(t[0], 0), sp);
      disp[1] = lerp(disp[1], num(t[1], 0), sp);
      disp[2] = lerp(disp[2], num(t[2], 0), sp);

      var br = num(window.brightness, 100) / 100; if (br < 0 || !isFinite(br)) br = 1;
      fill(disp[0] * br, disp[1] * br, disp[2] * br);

      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.font = "9px monospace";
      ctx.fillText(VER + " ok:" + okCount + " err:" + errCount + " hp:" + (state && state.health), 3, H - 5);
    } catch (e) {}

    if (now - lastPoll > 200) { lastPoll = now; poll(); }
    window.requestAnimationFrame(update);
  }

  window.requestAnimationFrame(update);
</script>

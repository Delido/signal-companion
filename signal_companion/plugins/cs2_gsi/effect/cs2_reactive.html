<head>
  <title>CS2 Reactive (SignalCompanion)</title>
  <meta description="Counter-Strike 2 reactive lighting via SignalCompanion's GSI bridge: team base glow, HP gradient, low-HP pulse, kill flash, flashbang white-out, smoke and molotov tints, an accelerating bomb-timer tick, bomb explosion and defuse flashes, and a visible idle when no match is running." />
  <meta publisher="SignalCompanion" />
  <meta property="port" label="Bridge port" type="number" min="1" max="65535" default="3000" />
  <meta property="brightness" label="Brightness" type="number" min="0" max="100" default="100" />
  <meta property="lowHpPulse" label="Low-HP pulse" type="boolean" default="1" />
  <meta property="killFlash" label="Kill flash" type="boolean" default="1" />
  <meta property="flashEffect" label="Flashbang white-out" type="boolean" default="1" />
  <meta property="smokeBurn" label="Smoke and molotov tints" type="boolean" default="1" />
  <meta property="bombAlarm" label="Bomb timer and explosion" type="boolean" default="1" />
</head>


<body style="margin: 0; padding: 0; background: #000">
  <canvas height="200" id="exCanvas" width="320"></canvas>
</body>

<script>
  // SignalRGB effect. Required shape: NO <!doctype>/<html> wrapper, <script>
  // after </body>, loop started from onEngineReady(). Also: NEVER put a bare
  // "&" in a meta label — it breaks SignalRGB's metadata parser, which then
  // skips effect init and the canvas stays black.
  var canvas, ctx;

  // SignalRGB injects each <meta property> as a GLOBAL of that name. Booleans
  // arrive as 1/0. Fall back to defaults for plain-browser preview.
  function prop(name, def) {
    try { var v = window[name]; return (v === undefined || v === null) ? def : v; }
    catch (e) { return def; }
  }
  function flag(name) { return !!Number(prop(name, 1)); }

  var state = { connected: false };
  var lastFetch = 0;
  var lastTeam = null;
  var prevRoundKills = null;
  var killFlashUntil = -1;
  var prevBomb = null;
  var bombPlantedAt = -1;
  var explosionUntil = -1;
  var defuseUntil = -1;
  var disp = [12, 12, 16];   // smoothed displayed colour

  function applyState(s) {
    state = (s && typeof s === "object") ? s : { connected: false };
  }

  function poll() {
    try {
      var port = prop("port", 3000);
      var url = "http://127.0.0.1:" + port + "/state";
      if (typeof fetch === "function") {
        fetch(url, { cache: "no-store" })
          .then(function (r) { return r.json(); })
          .then(applyState)
          .catch(function () {});
      } else if (typeof XMLHttpRequest === "function") {
        var x = new XMLHttpRequest();
        x.open("GET", url, true);
        x.onreadystatechange = function () {
          if (x.readyState === 4 && x.status === 200) {
            try { applyState(JSON.parse(x.responseText)); } catch (e) {}
          }
        };
        x.send();
      }
    } catch (e) {}
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  // Vivid per-team colour: T = yellow/amber, CT = blue.
  function teamColor(team) {
    if (team === "T")  return [210, 160, 0];
    if (team === "CT") return [0, 70, 205];
    return [40, 60, 90];
  }

  function fill(r, g, b) {
    r = r < 0 ? 0 : r > 255 ? 255 : r;
    g = g < 0 ? 0 : g > 255 ? 255 : g;
    b = b < 0 ? 0 : b > 255 ? 255 : b;
    ctx.fillStyle = "rgb(" + (r | 0) + "," + (g | 0) + "," + (b | 0) + ")";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function computeTarget(now) {
    // Bomb explosion is the loudest event — overrides everything briefly.
    if (now < explosionUntil) {
      var e = (explosionUntil - now) / 700;                 // 1 → 0
      return { c: [255, lerp(60, 235, e), lerp(0, 150, e)], speed: 0.85 };
    }

    if (!state.connected) {
      // Visible idle breathing (last team tint, or neutral) so it never looks
      // dead while waiting for / between matches.
      var p = (Math.sin(now / 1400) + 1) / 2;
      var bcol = lastTeam ? teamColor(lastTeam) : [40, 60, 90];
      var s = 0.16 + 0.20 * p;
      return { c: [bcol[0] * s, bcol[1] * s, bcol[2] * s + 8], speed: 0.08 };
    }

    lastTeam = state.team || lastTeam;
    var hp = (state.health == null) ? 100 : state.health;
    var alive = hp > 0 && state.activity !== "menu";
    var phase = state.round_phase;
    var t, speed;

    if (flag("bombAlarm") && state.bomb === "planted") {
      // Accelerating red tick (C4 ≈ 40 s): pulse speeds up the longer it's down.
      var elapsed = bombPlantedAt >= 0 ? (now - bombPlantedAt) / 1000 : 0;
      var frac = Math.max(0, Math.min(1, elapsed / 40));
      var rate = lerp(0.006, 0.05, frac);
      var pb = (Math.sin(now * rate) + 1) / 2;
      t = [lerp(90, 255, pb), lerp(20, 0, frac) * pb, 0];
      speed = 0.6;
    } else if (!alive) {
      var d = teamColor(state.team);                        // dead → dim team tint
      t = [d[0] * 0.22 + 6, d[1] * 0.22 + 6, d[2] * 0.22 + 10];
      speed = 0.1;
    } else if (phase === "freezetime") {
      var fz = teamColor(state.team);                       // round start → team glow
      t = [fz[0] * 0.85, fz[1] * 0.85, fz[2] * 0.85];
      speed = 0.12;
    } else {
      var k = Math.max(0, Math.min(1, hp / 100));           // HP gradient green→red
      t = [lerp(220, 30, k), lerp(30, 200, k), 30];
      if (flag("lowHpPulse") && hp <= 35) {
        var pl = (Math.sin(now / 170) + 1) / 2, amt = pl * (1 - hp / 35);
        t = [lerp(t[0], 255, amt), lerp(t[1], 0, amt), 0]; speed = 0.4;
      }
      if (flag("smokeBurn") && state.burning) {
        var bf = (Math.sin(now / 55) + 1) / 2;              // molotov flicker
        t = [lerp(t[0], 255, 0.6), lerp(t[1], 100 + 70 * bf, 0.6), 0]; speed = 0.5;
      }
      if (flag("smokeBurn") && state.smoked) {
        var avg = (t[0] + t[1] + t[2]) / 3;                 // smoke desaturates
        t = [lerp(t[0], avg, 0.6), lerp(t[1], avg, 0.6), lerp(t[2], avg, 0.6)];
      }
    }
    if (!t) { t = [20, 20, 24]; speed = 0.12; }

    // Flashbang white-out, over base/bomb (you're blinded).
    if (flag("flashEffect")) {
      var fl = (state.flashed || 0) / 255;
      if (fl > 0.02) {
        t = [lerp(t[0], 255, fl), lerp(t[1], 255, fl), lerp(t[2], 255, fl)];
        speed = Math.max(speed, 0.6);
      }
    }
    return { c: t, speed: speed };
  }

  function render(now) {
   try {
    // Bomb state machine (transitions detected by comparing to last frame).
    if (state.bomb === "planted") { if (bombPlantedAt < 0) bombPlantedAt = now; }
    else { bombPlantedAt = -1; }
    if (state.bomb === "exploded" && prevBomb !== "exploded") explosionUntil = now + 700;
    if (state.bomb === "defused"  && prevBomb !== "defused")  defuseUntil   = now + 600;
    prevBomb = state.bomb;

    // Kill detection (round_kills increases) → brief flash.
    if (flag("killFlash") && state.connected && prevRoundKills != null &&
        state.round_kills != null && state.round_kills > prevRoundKills) {
      killFlashUntil = now + 300;
    }
    prevRoundKills = state.round_kills;

    var bright = prop("brightness", 100) / 100;
    var tgt = computeTarget(now);
    var t = tgt.c, speed = tgt.speed;

    // Defuse success → green flash.
    if (now < defuseUntil) {
      var df = (defuseUntil - now) / 600;
      t = [lerp(t[0], 0, df), lerp(t[1], 255, df), lerp(t[2], 70, df)]; speed = 0.6;
    }
    // Kill flash → white blip on top.
    if (now < killFlashUntil) {
      var kf = (killFlashUntil - now) / 300;
      t = [lerp(t[0], 255, kf), lerp(t[1], 255, kf), lerp(t[2], 255, kf)]; speed = 0.7;
    }

    disp[0] = lerp(disp[0], t[0], speed);
    disp[1] = lerp(disp[1], t[1], speed);
    disp[2] = lerp(disp[2], t[2], speed);
    fill(disp[0] * bright, disp[1] * bright, disp[2] * bright);
   } catch (e) { /* never let a frame error stop the loop */ }

   if (now - lastFetch > 100) { lastFetch = now; poll(); }
   window.requestAnimationFrame(render);
  }

  // SignalRGB entry point — required for the effect to activate.
  function onEngineReady() {
    canvas = document.getElementById("exCanvas");
    ctx = canvas.getContext("2d");
    window.requestAnimationFrame(render);
  }
</script>
</head>

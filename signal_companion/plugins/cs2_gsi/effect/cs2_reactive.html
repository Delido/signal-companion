<head>
  <title>CS2 Reactive (SignalCompanion)</title>
  <meta description="Counter-Strike 2 reactive lighting via the SignalCompanion HTTPS bridge: HP gradient, low-HP edge pulse, kill flash, full flashbang white-out, smoke and molotov tints, a bomb tick synced to the 40s C4 fuse, explosion and defuse flashes, and a death vignette that closes in from the edges." />
  <meta publisher="SignalCompanion" />
  <meta property="brightness" label="Brightness" type="number" min="0" max="100" default="100" />
</head>

<body style="margin: 0; padding: 0; background: black">
  <canvas id="exCanvas" width="320" height="200"></canvas>
</body>

<script>
  var VER = "v2.0";
  var c = document.getElementById("exCanvas");
  var ctx = c.getContext("2d");
  var W = 320, H = 200, CX = 160, CY = 100, MAXR = 200;  // center-to-corner ~189

  var state = { connected: false };
  var okCount = 0, errCount = 0, lastOk = -99999, fetching = false, lastPoll = 0;
  var lastNow = 0, lastTeam = null;
  var prevBomb = null, prevKills = null, wasDead = false;
  var bombAt = -1, bombPhase = 0, deathAt = -1;
  var explodeUntil = -1, defuseUntil = -1, killUntil = -1;

  function num(v, d) { v = +v; return isFinite(v) ? v : d; }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  function teamCol(team) {
    if (team === "T") return [230, 150, 0];
    if (team === "CT") return [0, 90, 230];
    return [0, 120, 180];
  }

  function poll() {
    if (fetching) return;
    fetching = true;
    var done = false;
    function fin() { if (!done) { done = true; fetching = false; } }
    try {
      var ctrl = (typeof AbortController === "function") ? new AbortController() : null;
      var opts = { method: "POST", body: "1", cache: "no-store" };
      if (ctrl) opts.signal = ctrl.signal;
      var timer = setTimeout(function () { errCount++; if (ctrl) { try { ctrl.abort(); } catch (e) {} } fin(); }, 800);
      fetch("https://127.0.0.1:3443/state", opts)
        .then(function (r) { return r.json(); })
        .then(function (s) { clearTimeout(timer); if (s && typeof s === "object") { state = s; okCount++; lastOk = Date.now(); } fin(); })
        .catch(function () { clearTimeout(timer); errCount++; fin(); });
    } catch (e) { errCount++; fin(); }
  }

  function fillAll(r, g, b) {
    ctx.fillStyle = "rgb(" + (clamp(num(r, 0), 0, 255) | 0) + "," + (clamp(num(g, 0), 0, 255) | 0) + "," + (clamp(num(b, 0), 0, 255) | 0) + ")";
    ctx.fillRect(0, 0, W, H);
  }

  // Radial base: colour in the centre fading a bit darker to the edges.
  function radialBase(col, edgeMul) {
    var g = ctx.createRadialGradient(CX, CY, 10, CX, CY, MAXR);
    g.addColorStop(0, "rgb(" + (col[0] | 0) + "," + (col[1] | 0) + "," + (col[2] | 0) + ")");
    g.addColorStop(1, "rgb(" + (col[0] * edgeMul | 0) + "," + (col[1] * edgeMul | 0) + "," + (col[2] * edgeMul | 0) + ")");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  // Pulsing red glow on the edges (low HP / bomb), centre stays clearer.
  function edgePulse(rgb, alpha) {
    var g = ctx.createRadialGradient(CX, CY, 40, CX, CY, MAXR);
    g.addColorStop(0, "rgba(" + rgb + ",0)");
    g.addColorStop(0.55, "rgba(" + rgb + "," + (alpha * 0.4).toFixed(3) + ")");
    g.addColorStop(1, "rgba(" + rgb + "," + alpha.toFixed(3) + ")");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  function overlay(rgba) { ctx.fillStyle = rgba; ctx.fillRect(0, 0, W, H); }

  // Black vignette closing from the edges to the centre (death). prog 0..1.
  function closingBlack(prog) {
    var clearR = MAXR * (1 - prog);
    var inner = Math.max(0, clearR - 55);
    var g = ctx.createRadialGradient(CX, CY, inner, CX, CY, clearR + 1);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,1)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    if (prog >= 1) fillAll(0, 0, 0);
  }

  function render(now, dt) {
    var p = (Math.sin(now / 600) + 1) / 2;

    // ── connection diagnostics ──
    if (okCount === 0) { fillAll(110 + 130 * p, 0, 0); return; }      // never reached bridge
    if (now - lastOk > 2500) { fillAll(210, 70 + 90 * p, 0); return; } // bridge gone

    if (!state || !state.connected) {                                 // idle: no match
      var bc = lastTeam ? teamCol(lastTeam) : [0, 120, 180];
      var s = 0.4 + 0.45 * p;
      radialBase([bc[0] * s, bc[1] * s, bc[2] * s], 0.35);
      return;
    }

    lastTeam = state.team || lastTeam;
    var hp = (state.health == null) ? 100 : num(state.health, 100);
    var alive = hp > 0 && state.activity !== "menu";

    // ── base layer ──
    if (state.round_phase === "freezetime") {
      var fz = teamCol(state.team);
      radialBase([fz[0] * 0.8, fz[1] * 0.8, fz[2] * 0.8], 0.5);
    } else {
      var k = clamp(hp / 100, 0, 1);
      radialBase([lerp(220, 30, k), lerp(30, 200, k), 30], 0.45);
    }

    // ── smoke desaturate / molotov flicker (over base) ──
    if (num(state.smoked, 0) > 0) overlay("rgba(150,150,150," + (0.45).toFixed(2) + ")");
    if (num(state.burning, 0) > 0) {
      var bf = (Math.sin(now / 50) + 1) / 2;
      overlay("rgba(255," + (90 + 80 * bf | 0) + ",0,0.45)");
    }

    // ── low-HP edge pulse ──
    if (alive && hp <= 35) edgePulse("255,0,0", clamp((1 - hp / 35), 0, 1) * (0.4 + 0.5 * p));

    // ── bomb: accelerating tick synced to the ~40 s C4 fuse ──
    if (state.bomb === "planted" && bombAt >= 0) {
      var el = (now - bombAt) / 1000;
      var frac = clamp(el / 40, 0, 1);
      var beepsPerSec = lerp(1.0, 9.0, frac);
      bombPhase += (dt / 1000) * beepsPerSec;
      var on = (bombPhase % 1) < 0.4;
      edgePulse("255,0,0", on ? 0.9 : 0.18);                          // beep flash on edges
      if (on) overlay("rgba(255,0,0,0.12)");
    }

    // ── kill flash ──
    if (now < killUntil) overlay("rgba(255,255,255," + clamp((killUntil - now) / 300, 0, 1).toFixed(2) + ")");

    // ── defuse / explosion ──
    if (now < defuseUntil) overlay("rgba(0,255,90," + clamp((defuseUntil - now) / 600, 0, 1).toFixed(2) + ")");
    if (now < explodeUntil) {
      var e = clamp((explodeUntil - now) / 900, 0, 1);
      overlay("rgba(255," + (60 + 180 * e | 0) + "," + (0 + 140 * e | 0) + "," + (0.85 * e + 0.1).toFixed(2) + ")");
    }

    // ── death: black closes in from the edges, then stays black ──
    if (deathAt >= 0) closingBlack(clamp((now - deathAt) / 2500, 0, 1));

    // ── flashbang: full white-out on top (you're blinded) ──
    var fl = clamp(num(state.flashed, 0) / 255, 0, 1);
    if (fl > 0.02) overlay("rgba(255,255,255," + fl.toFixed(3) + ")");
  }

  function update() {
    var now = Date.now();
    var dt = clamp(now - (lastNow || now), 0, 100); lastNow = now;
    try {
      // ── event edges ──
      var connected = state && state.connected;
      var hp = state && state.health != null ? num(state.health, 100) : 100;
      var isDead = connected && hp <= 0 && state.activity !== "menu";
      if (isDead && !wasDead) deathAt = now;                 // just died
      if (!isDead) deathAt = -1;
      wasDead = isDead;

      if (connected && state.bomb === "planted") { if (bombAt < 0) { bombAt = now; bombPhase = 0; } }
      else { bombAt = -1; }
      if (connected && state.bomb === "exploded" && prevBomb !== "exploded") explodeUntil = now + 900;
      if (connected && state.bomb === "defused" && prevBomb !== "defused") defuseUntil = now + 600;
      prevBomb = connected ? state.bomb : null;
      if (connected && prevKills != null && state.round_kills != null && state.round_kills > prevKills) killUntil = now + 300;
      prevKills = connected ? state.round_kills : null;

      render(now, dt);

      var br = num(window.brightness, 100) / 100;
      if (br < 0 || !isFinite(br)) br = 1;
      if (br < 1) overlay("rgba(0,0,0," + (1 - br).toFixed(3) + ")");  // global dim

      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.font = "9px monospace";
      ctx.fillText(VER + " ok:" + okCount + " err:" + errCount + " hp:" + (state && state.health), 3, H - 5);
    } catch (e) {}

    if (now - lastPoll > 200) { lastPoll = now; poll(); }
    window.requestAnimationFrame(update);
  }

  window.requestAnimationFrame(update);
</script>
